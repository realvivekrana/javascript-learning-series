<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function test1(cb) {
            setTimeout(function(){
                print();
                cb();
                console.log("Test1 Completed");
            },2000);
            //wait for 2 seconds and then print function
            //passing the function as argument called callback
        }

        function print() {
            console.log("Timer Completed");
        }
        function callback() {
            console.log("My test Function");
        }
        test1(callback);
    </script>
</body>
</html>
