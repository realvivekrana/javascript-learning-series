<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Image</title>
</head>
<body>
    <h1 id="title">Random cat</h1>
    <img id="image" width="700">
    
    <script>
        async function fetchData(){
            try {
                const resp = await fetch('https://api.thecatapi.com/v1/images/search?limit=10');
                const json = await resp.json();
                console.log(json);

                const cat  = json [0];
                document.getElementById('image').src = cat.url;

            } catch (error) {
                console.log(error);
            }
        }

        fetchData();
    </script>
</body>
</html>
