<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
</head>
<body>

    <h2>Todo App</h2>

    <input type="text" id="todo" placeholder="Enter Your Todo">
    <button onclick="add()">Add Todo</button>

    <div id="list"></div>

    <script src="script.js"></script>

    <script>
        const myTodo = new Todo(); //object of the todo

        function add(){
            const task = document.getElementById('todo');
            myTodo.addTodo(task.value);

            // alert('Task Added Successfully'); 

            task.value = '';
            display();
        }

        function display(){
            const todos = myTodo.getAllTodos();
            //console.log(todos);
            let data = '';
            for(let t of todos){
                data += `<li> ${t.name} <button onclick = 'removeData(${t.id})'>X</button></li>`;
            }
            document.getElementById('list').innerHTML = data;
        }
        function removeData(id){
            myTodo.removeTodo(id);
            display();
        }
    </script>

</body>
</html>
