<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="todolist.css">
</head>
<body>
    <h1>Todo List Application</h1>
    <input type="text" id="task" placeholder="Enter Your Task">
    <br> <br>
    <button onclick="addTodos()">Add Task</button>
    <h3>Task List</h3>
    <ul id = "tasks"></ul>
    <script>
        let todos=[];

        function addTodos(){
            const task = document.getElementById("task").value;
            if(task!=''){
                todos.push({id:Date.now(),task});
                display();
                document.getElementById("task").value='';
            }
            else{
                alert("Please enter a task");
            }
        }
            function display(){
        let data='';
        for(let t of todos){
            data+=`<li>${t.task} 
            <button onclick="removetodos(${t.id})">X</button></li>`
        }
        document.getElementById('tasks').innerHTML=data;
    }
            function removetodos(t){
                console.log(t);
                const index = todos.findIndex(function (item) {return item.id===t});
                todos.splice(index,1);
                display();
            }
    </script>
</body>
</html>
