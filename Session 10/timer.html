<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timer</title>
    <link rel="stylesheet" href="timmer.css">
</head>
<body>

    <button id="btn">00:00</button>

    <button onclick="start()">Start</button>
    <button onclick="stop()">Stop</button>
    <button onclick="clearData()">Clear</button>

    <script>
        let interval = null;
        let startTime = 0;
        const btn = document.getElementById('btn');

        function start() {
            if (interval !== null) return;

            startTime = Date.now();

            interval = setInterval(() => {
                let elapsed = Math.floor((Date.now() - startTime) / 1000);

                let min = Math.floor(elapsed / 60);
                let sec = elapsed % 60;

                btn.textContent =
                    (min > 9 ? min : `0${min}`) + ':' +
                    (sec > 9 ? sec : `0${sec}`);
            }, 1000);
        }

        function stop() {
            if (interval !== null) {
                clearInterval(interval);
                interval = null;
                alert(btn.textContent + " Time taken...");
            } else {
                alert("First Start Your Timer");
            }
        }

        function clearData() {
            if (interval !== null) {
                clearInterval(interval);
                interval = null;
            }
            btn.textContent = "00:00";
        }
    </script>
</body>
</html>
