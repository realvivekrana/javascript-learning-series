<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="heading1"></h1>
    <h2 id="heading2"></h2>
    <button onclick="show()">Click Me</button>
    <script>
        function show(){
            document.getElementById("heading1").innerText = "Hello World";
            document.getElementById("heading2").innerText = "Welcome To JavaScript";

            document.getElementById("heading1").style.color = "red";
            document.getElementById("heading2").style.color = "blue";
        }
    </script>
</body>
</html>
