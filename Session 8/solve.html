<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Methods Practice</title>
</head>
<body>

    <h1>Array Methods Output (Check Console)</h1>

    <script>
        
        // 1️. FILTERING – EVEN NUMBERS
        function filterArray(numbers){
            return numbers.filter(function(item){
                return item % 2 === 0;
            });
        }

        const evenResult = filterArray([1,2,3,4,5,6,7,8,9]);
        console.log("Even Numbers:", evenResult);


        
        // 2️. MAPPING – 10% DISCOUNT
        function applyDiscount(prices){
            return prices.map(function(price){
                return price - (price * 10 / 100);
            });
        }

        const prices = [100, 200, 300, 400];
        const discountedPrices = applyDiscount(prices);
        console.log("Discounted Prices:", discountedPrices);


        
        // 3️. REDUCING – AVERAGE AGE
        function findAverage(ages){
            const total = ages.reduce(function(sum, age){
                return sum + age;
            }, 0);

            return total / ages.length;
        }

        const ages = [20, 25, 30, 35];
        console.log("Average Age:", findAverage(ages));



        // 4️. COMBINING – FILTER + MAP
        function filterAndCapitalize(words){
            return words
                .filter(function(word){
                    return word.length > 5;
                })
                .map(function(word){
                    return word.toUpperCase();
                });
        }

        const words = ["hello", "javascript", "react", "developer", "css"];
        console.log("Filtered & Capitalized Words:", filterAndCapitalize(words));
    </script>

</body>
</html>
