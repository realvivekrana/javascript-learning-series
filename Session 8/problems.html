<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const names = ['Alice', 'Bob', 'Charlie', 'David', 'Eve', 'Frank'];

        const newArray = names.filter(function(item){
            return item.length >= 5;
        });

        console.log(names);
        console.log(newArray);

        const array = [2,8,5,6,8,65,96,47,56,25,36,99,65,44];

        console.log(`Original length: ${array.length}`);
        console.log(`Filter length: ${array.filter(function(item){
            return item % 2 !== 0;
        }).length}`);

        // expand way
        const filteredOdd = array.filter(function(item){
            return item % 2 !== 0;
        });

        const count = filteredOdd.length;
        console.log(`Filter length: ${count}`);
    </script>
</body>
</html>
